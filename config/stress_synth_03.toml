[controller]
file = "KaFa_1500_v9.py"

[deploy]
check_drone_start_pos = true
check_race_track = true
real_track_objects = true

[[deploy.drones]]
id = 52
channel = 80
drone_model = "cf21B_500"

[env]
control_mode = "attitude"
freq = 50
id = "DroneRacing-v0"
seed = -1
sensor_range = 0.7

[sim]
attitude_freq = 500
camera = -1
drone_model = "cf21B_500"
freq = 500
physics = "first_principles"
render = true

[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.0, 0.0, 0.0]

[env.track]
randomize = false


[[env.track.drones]]
pos = [0.6182, 0.9827, 0.0300]
rpy = [0.0000, 0.0000, 0.0000]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[[env.track.gates]]
pos = [0.0699, 1.0260, 0.7068]
rpy = [0.0000, 0.0000, 3.0628]

[[env.track.gates]]
pos = [-1.4238, 0.1741, 1.0840]
rpy = [0.0000, 0.0000, -1.5707]

[[env.track.gates]]
pos = [0.0701, -0.7539, 1.0920]
rpy = [0.0000, 0.0000, -0.0787]

[[env.track.gates]]
pos = [1.3152, -0.0421, 0.7110]
rpy = [0.0000, 0.0000, 1.5709]

[[env.track.obstacles]]
pos = [-1.2845, -0.4095, 1.5591]

[[env.track.obstacles]]
pos = [0.3371, 0.5838, 1.5422]

[[env.track.obstacles]]
pos = [0.3450, -0.0115, 1.5520]

[[env.track.obstacles]]
pos = [-0.6079, -0.8543, 1.5482]

[[env.track.obstacles]]
pos = [-1.0621, -0.8060, 1.5476]

[env.disturbances.action]
fn = "normal"
scale = 0.001

[env.disturbances.dynamics]
fn = "uniform"

[env.randomizations.drone_inertia]
fn = "uniform"

[env.randomizations.drone_mass]
fn = "uniform"

[env.randomizations.drone_pos]
fn = "uniform"

[env.randomizations.drone_rpy]
fn = "uniform"

[env.randomizations.gate_pos]
fn = "uniform"

[env.randomizations.gate_rpy]
fn = "uniform"

[env.randomizations.obstacle_pos]
fn = "uniform"

[env.track.safety_limits]
pos_limit_high = [2.5, 1.5, 2.0]
pos_limit_low = [-2.5, -1.5, -0.001]

[env.disturbances.dynamics.kwargs]
maxval = [0.1, 0.1, 0.1]
minval = [-0.1, -0.1, -0.1]

[env.randomizations.drone_inertia.kwargs]
maxval = [1e-6, 1e-6, 1e-6]
minval = [-1e-6, -1e-6, -1e-6]

[env.randomizations.drone_mass.kwargs]
maxval = 0.005
minval = -0.005

[env.randomizations.drone_pos.kwargs]
maxval = [0.1, 0.1, 0.02]
minval = [-0.1, -0.1, 0.0]

[env.randomizations.drone_rpy.kwargs]
maxval = [0.1, 0.1, 0.1]
minval = [-0.1, -0.1, -0.1]

[env.randomizations.gate_pos.kwargs]
maxval = [0.15, 0.15, 0.1]
minval = [-0.15, -0.15, -0.1]

[env.randomizations.gate_rpy.kwargs]
maxval = [0.05, 0.1, 0.2]
minval = [-0.05, -0.1, -0.2]

[env.randomizations.obstacle_pos.kwargs]
maxval = [0.15, 0.15, 0.05]
minval = [-0.15, -0.15, -0.05]
