[controller]
file = "KaFa_1500_v9.py"

[deploy]
check_drone_start_pos = true
check_race_track = true
real_track_objects = true

[[deploy.drones]]
id = 52
channel = 80
drone_model = "cf21B_500"

[env]
control_mode = "attitude"
freq = 50
id = "DroneRacing-v0"
seed = -1
sensor_range = 0.7

[sim]
attitude_freq = 500
camera = -1
drone_model = "cf21B_500"
freq = 500
physics = "first_principles"
render = true

[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.0, 0.0, 0.0]

[env.track]
randomize = false


[[env.track.drones]]
pos = [1.0262, 0.7751, 0.0300]
rpy = [0.0000, 0.0000, 0.0000]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[[env.track.gates]]
pos = [0.4777, 0.7348, 1.1014]
rpy = [0.0000, 0.0000, -3.0684]

[[env.track.gates]]
pos = [-0.9217, -0.1913, 0.7208]
rpy = [0.0000, 0.0000, -1.8412]

[[env.track.gates]]
pos = [0.0935, -0.6515, 1.1283]
rpy = [0.0000, 0.0000, 0.0732]

[[env.track.gates]]
pos = [0.8791, -0.0592, 0.7361]
rpy = [0.0000, 0.0000, 1.3004]

[[env.track.obstacles]]
pos = [-1.0503, 0.5538, 1.5569]

[[env.track.obstacles]]
pos = [-0.3535, 0.9153, 1.5495]

[[env.track.obstacles]]
pos = [0.8693, -0.5913, 1.5447]

[[env.track.obstacles]]
pos = [0.4671, 0.1602, 1.5480]

[env.disturbances.action]
fn = "normal"
scale = 0.001

[env.disturbances.dynamics]
fn = "uniform"

[env.randomizations.drone_inertia]
fn = "uniform"

[env.randomizations.drone_mass]
fn = "uniform"

[env.randomizations.drone_pos]
fn = "uniform"

[env.randomizations.drone_rpy]
fn = "uniform"

[env.randomizations.gate_pos]
fn = "uniform"

[env.randomizations.gate_rpy]
fn = "uniform"

[env.randomizations.obstacle_pos]
fn = "uniform"

[env.track.safety_limits]
pos_limit_high = [2.5, 1.5, 2.0]
pos_limit_low = [-2.5, -1.5, -0.001]

[env.disturbances.dynamics.kwargs]
maxval = [0.1, 0.1, 0.1]
minval = [-0.1, -0.1, -0.1]

[env.randomizations.drone_inertia.kwargs]
maxval = [1e-6, 1e-6, 1e-6]
minval = [-1e-6, -1e-6, -1e-6]

[env.randomizations.drone_mass.kwargs]
maxval = 0.005
minval = -0.005

[env.randomizations.drone_pos.kwargs]
maxval = [0.1, 0.1, 0.02]
minval = [-0.1, -0.1, 0.0]

[env.randomizations.drone_rpy.kwargs]
maxval = [0.1, 0.1, 0.1]
minval = [-0.1, -0.1, -0.1]

[env.randomizations.gate_pos.kwargs]
maxval = [0.15, 0.15, 0.1]
minval = [-0.15, -0.15, -0.1]

[env.randomizations.gate_rpy.kwargs]
maxval = [0.05, 0.1, 0.2]
minval = [-0.05, -0.1, -0.2]

[env.randomizations.obstacle_pos.kwargs]
maxval = [0.15, 0.15, 0.05]
minval = [-0.15, -0.15, -0.05]
