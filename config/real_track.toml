[controller]
file = "KaFa_1500_v3.py"

[deploy]
check_drone_start_pos = true
check_race_track = true
real_track_objects = true

[[deploy.drones]]
id = 52
channel = 80
drone_model = "cf21B_500"

[env]
control_mode = "attitude"
freq = 50
id = "DroneRacing-v0"
seed = -1
sensor_range = 0.7

[sim]
attitude_freq = 500
camera = -1
drone_model = "cf21B_500"
freq = 500
physics = "first_principles"
render = true

[[sim.cam_config]]
distance = 5.0
azimuth = 180.0
elevation = -25.0
lookat = [0.0, 0.0, 0.0]

[env.track]
randomize = false

[[env.track.drones]]
pos = [0.030080696567893028, 0.0344480499625206, 0.03274901583790779]
rpy = [0.022789594875898128, -0.08397513725525152, -0.09907929405417694]
vel = [0, 0, 0]
ang_vel = [0, 0, 0]

[[env.track.gates]]
pos = [1.1068309545516968, -0.06685645878314972, 0.6745350956916809]
rpy = [-0.009419052285874863, -0.002562915445948555, -0.513755169015903]

[[env.track.gates]]
pos = [0.569272518157959, 0.9576483368873596, 1.224316954612732]
rpy = [0.004607086231285917, 3.664570623596042e-5, -1.1830854031884563]

[[env.track.gates]]
pos = [-0.35676443576812744, -0.49776971340179443, 0.6672854423522949]
rpy = [0.025962767071242343, -0.03353348683233581, -2.830430103411268]

[[env.track.gates]]
pos = [-1.8103241920471191, -0.4840492308139801, 1.2089310884475708]
rpy = [-0.001951597153650897, -0.037991601157180144, 1.9275192169848867]

[[env.track.obstacles]]
pos = [0.264634907245636, -0.664111316204071, 1.5549585819244385]

[[env.track.obstacles]]
pos = [-0.8579573035240173, -0.4945439100265503, 1.546891212463379]

[[env.track.obstacles]]
pos = [0.5520194172859192, 0.26283594965934753, 1.552022933959961]

[[env.track.obstacles]]
pos = [-0.41314584016799927, 0.543511688709259, 1.5518231391906738]

[env.disturbances.action]
fn = "normal"
scale = 0.001

[env.disturbances.dynamics]
fn = "uniform"

[env.randomizations.drone_inertia]
fn = "uniform"

[env.randomizations.drone_mass]
fn = "uniform"

[env.randomizations.drone_pos]
fn = "uniform"

[env.randomizations.drone_rpy]
fn = "uniform"

[env.randomizations.gate_pos]
fn = "uniform"

[env.randomizations.gate_rpy]
fn = "uniform"

[env.randomizations.obstacle_pos]
fn = "uniform"

[env.track.safety_limits]
pos_limit_high = [2.5, 1.5, 2.0]
pos_limit_low = [-2.5, -1.5, -0.001]

[env.disturbances.dynamics.kwargs]
maxval = [0.1, 0.1, 0.1]
minval = [-0.1, -0.1, -0.1]

[env.randomizations.drone_inertia.kwargs]
maxval = [1e-6, 1e-6, 1e-6]
minval = [-1e-6, -1e-6, -1e-6]

[env.randomizations.drone_mass.kwargs]
maxval = 0.005
minval = -0.005

[env.randomizations.drone_pos.kwargs]
